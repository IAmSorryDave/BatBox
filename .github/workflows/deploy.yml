name: Build and Deploy to Docker Hub

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine version from RC branch
        id: version
        run: |
          # Check if we were merged from a release-candidate branch
          MERGE_COMMIT_MESSAGE=$(git log --format=%B -n1 HEAD | head -1)
          
          # Try to extract RC version from merge commit
          if echo "$MERGE_COMMIT_MESSAGE" | grep -oP "release-candidate-v\K[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+" > /tmp/rc_version.txt; then
            VERSION=$(cat /tmp/rc_version.txt)
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected RC version from merge: $VERSION"
          else
            # Fallback: Generate from latest tag
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3 | cut -d'r' -f1)
            NEW_PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "Generated new version: $VERSION"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
